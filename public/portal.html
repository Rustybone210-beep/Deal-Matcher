<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealMatcher — My Deals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060810;--s1:rgba(14,17,28,0.92);--s2:rgba(20,24,40,0.88);--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);--teal:#34d399;--teal2:#059669;--gold:#f59e0b;--red:#ef4444;--t1:#f0f2f8;--t2:#7c8599;--t3:#3d4560;--sans:'Instrument Sans',system-ui,sans-serif;--serif:'Fraunces',serif}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center}
.login-box h1{font-family:var(--serif);font-size:28px;margin-bottom:6px}
.login-box h1 span{color:var(--teal)}
.login-box p{color:var(--t2);font-size:14px;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-size:16px;margin-bottom:16px;outline:none;font-family:var(--sans)}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--bg);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}
.portal{display:none}
.header{background:rgba(8,10,18,0.98);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header h1{font-family:var(--serif);font-size:20px}.header h1 span{color:var(--teal)}
.header-right{display:flex;align-items:center;gap:12px}
.user-name{font-size:13px;color:var(--t2)}
.logout-btn{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--t2)}
.welcome-banner{padding:28px 24px;background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(5,150,105,0.04));border-bottom:1px solid var(--bd)}
.welcome-name{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:4px}
.welcome-sub{color:var(--t2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 24px}
.stat-box{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:18px;text-align:center}
.stat-num{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--teal)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);margin-top:4px}
.criteria-bar{margin:0 24px;padding:16px 20px;background:var(--s1);border:1px solid var(--bd);border-radius:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.criteria-item{font-size:13px;color:var(--t2)}.criteria-item strong{color:var(--teal)}
.edit-btn{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(52,211,153,0.3);background:rgba(52,211,153,0.1);color:var(--teal)}
.section-title{font-family:var(--serif);font-size:18px;font-weight:700;padding:24px 24px 12px}
.deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:0 24px 100px}
.deal-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;transition:all 0.15s}
.deal-card:hover{border-color:rgba(52,211,153,0.3);transform:translateY(-2px)}
.deal-name{font-weight:700;font-size:15px;margin-bottom:4px}
.deal-location{font-size:13px;color:var(--t2);margin-bottom:8px}
.deal-price{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--teal);margin-bottom:8px}
.deal-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.deal-badge{padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-ind{background:rgba(59,130,246,0.1);color:#3b82f6}
.badge-score{background:rgba(52,211,153,0.1);color:var(--teal)}
.deal-actions{display:flex;gap:8px;margin-top:12px}
.deal-link{padding:8px 14px;border-radius:999px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--bd2);color:var(--t2)}
.deal-link:hover{color:var(--t1);text-decoration:none}
.interest-btn{padding:8px 16px;border-radius:999px;font-size:12px;font-weight:700;border:none;background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--bg);cursor:pointer}
.interest-btn.sent{background:var(--s2);color:var(--teal);border:1px solid rgba(52,211,153,0.3);cursor:default}
.chat-toggle{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;color:var(--bg);font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(52,211,153,0.3);z-index:100;display:none;align-items:center;justify-content:center}
.chat-panel{position:fixed;bottom:92px;right:24px;width:380px;max-height:500px;background:rgba(10,12,22,0.99);border:1px solid var(--bd2);border-radius:20px;z-index:100;display:none;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.chat-panel.open{display:flex}
.chat-hdr{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.chat-hdr h3{font-family:var(--serif);font-size:16px;color:var(--teal)}
.chat-x{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;min-height:280px;max-height:340px}
.cmsg{margin-bottom:12px;font-size:13px;line-height:1.5}
.cmsg.ai{background:var(--s2);border-radius:12px 12px 12px 4px;padding:10px 14px}
.cmsg.user{background:rgba(52,211,153,0.1);border-radius:12px 12px 4px 12px;padding:10px 14px;color:var(--teal);margin-left:40px}
.cmsg .ai-n{font-size:10px;color:var(--teal);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.chat-row{padding:12px;border-top:1px solid var(--bd);display:flex;gap:8px}
.chat-in{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-size:13px;outline:none;font-family:var(--sans)}
.chat-in:focus{border-color:var(--teal)}
.chat-go{padding:10px 16px;border-radius:10px;background:var(--teal);color:var(--bg);border:none;font-weight:700;font-size:13px;cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:rgba(10,12,22,0.99);border:1px solid var(--bd2);border-radius:20px;padding:28px;width:90%;max-width:480px}
.modal h2{font-family:var(--serif);font-size:20px;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.field input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--t1);outline:none;font-family:var(--sans)}
.field input:focus{border-color:rgba(52,211,153,0.3)}
.mactions{display:flex;gap:10px;margin-top:20px}
.mactions button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--sans)}
.btn-sv{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--bg)}
.btn-cn{background:var(--s2);color:var(--t2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid rgba(52,211,153,0.3);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--teal);z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.deals-grid{grid-template-columns:1fr}.chat-panel{width:calc(100vw - 32px);right:16px}}
</style>
<script defer data-domain="dealmatcherapp.com" src="https://plausible.io/js/script.js"></script>
</head>
<body>
<div class="login-screen" id="loginScreen"><div class="login-box"><h1>Deal<span>Matcher</span></h1><p>Enter your email to view your matched deals</p><input class="login-input" id="loginEmail" type="email" placeholder="your@email.com" autofocus><button class="login-btn" onclick="portalLogin()">View My Deals</button><div class="login-error" id="loginError"></div><p style="margin-top:20px;font-size:12px;color:var(--t3)">No account? <a href="/subscribe.html" style="color:var(--teal)">Sign up free</a></p></div></div>
<div class="portal" id="portal"><div class="header"><h1>Deal<span>Matcher</span></h1><div class="header-right"><span class="user-name" id="headerName"></span><button class="logout-btn" onclick="logout()">Log Out</button></div></div><div class="welcome-banner"><div class="welcome-name" id="welcomeName"></div><div class="welcome-sub">Your personalized deal matches, updated weekly.</div></div><div class="stats-row" id="statsRow"></div><div class="criteria-bar" id="criteriaBar"></div><div class="section-title">Your Top Matches</div><div class="deals-grid" id="dealsGrid"></div></div>
<div class="modal-bg" id="editModal"><div class="modal"><h2>Update Your Criteria</h2><div class="field"><label>Industries</label><input id="editInd"></div><div class="field"><label>Locations</label><input id="editLoc"></div><div class="field"><label>Min Price ($)</label><input id="editMin" type="number"></div><div class="field"><label>Max Price ($)</label><input id="editMax" type="number"></div><div class="mactions"><button class="btn-cn" onclick="document.getElementById('editModal').classList.remove('open')">Cancel</button><button class="btn-sv" onclick="saveCriteria()">Save & Re-Match</button></div></div></div>
<button class="chat-toggle" id="chatToggle" onclick="toggleChat()">💬</button>
<div class="chat-panel" id="chatPanel"><div class="chat-hdr"><h3>DealMatcher AI</h3><button class="chat-x" onclick="toggleChat()">✕</button></div><div class="chat-msgs" id="chatMsgs"></div><div class="chat-row"><input class="chat-in" id="chatIn" placeholder="Ask about your deals..." onkeydown="if(event.key==='Enter')sendChat()"><button class="chat-go" onclick="sendChat()">Send</button></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
let inv=null,matches=[];
document.getElementById('loginEmail').addEventListener('keydown',e=>{if(e.key==='Enter')portalLogin()});
async function portalLogin(){const email=document.getElementById('loginEmail').value.trim();if(!email)return;const err=document.getElementById('loginError');err.style.display='none';try{const r=await fetch('/api/portal/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const d=await r.json();if(!r.ok){err.textContent=d.error;err.style.display='block';return}inv=d.investor;matches=d.matches;renderPortal(d)}catch(e){err.textContent='Connection error';err.style.display='block'}}
function renderPortal(d){document.getElementById('loginScreen').style.display='none';document.getElementById('portal').style.display='block';document.getElementById('chatToggle').style.display='flex';document.getElementById('headerName').textContent=inv.name;document.getElementById('welcomeName').textContent='Welcome back, '+inv.name.split(' ')[0];document.getElementById('statsRow').innerHTML='<div class="stat-box"><div class="stat-num">'+d.stats.totalMatches+'</div><div class="stat-lbl">Total Matches</div></div><div class="stat-box"><div class="stat-num">'+d.stats.strongMatches+'</div><div class="stat-lbl">Strong (50+)</div></div><div class="stat-box"><div class="stat-num">'+d.matches.length+'</div><div class="stat-lbl">Showing</div></div>';document.getElementById('criteriaBar').innerHTML='<div style="display:flex;gap:16px;flex-wrap:wrap"><div class="criteria-item">Industries: <strong>'+(inv.industries||'All')+'</strong></div><div class="criteria-item">Locations: <strong>'+(inv.locations||'All')+'</strong></div><div class="criteria-item">Range: <strong>$'+fmt(inv.min_price)+' – $'+fmt(inv.max_price)+'</strong></div></div><button class="edit-btn" onclick="openEdit()">Edit Criteria</button>';renderDeals(d.matches);setTimeout(()=>{addMsg('ai','Welcome back, '+inv.name.split(' ')[0]+'! I found '+d.stats.strongMatches+' strong matches for you. Browse below and click "I\'m Interested" on any deal to start the introduction process.')},800)}
function renderDeals(m){const g=document.getElementById('dealsGrid');if(!m.length){g.innerHTML='<div style="text-align:center;padding:48px;color:var(--t3);grid-column:1/-1">No matches yet. We\'re scanning for deals.</div>';return}g.innerHTML=m.map(d=>{const sc=d.score>=70?'var(--teal)':d.score>=50?'var(--gold)':'var(--t2)';return'<div class="deal-card"><div class="deal-name">'+esc(d.name)+'</div><div class="deal-location">'+esc([d.city,d.state].filter(Boolean).join(', '))+'</div><div class="deal-price">$'+fmt(d.asking_price)+'</div><div class="deal-meta"><span class="deal-badge badge-ind">'+esc(d.industry||'Commercial')+'</span><span class="deal-badge badge-score" style="color:'+sc+'">Score: '+d.score+'</span>'+(d.revenue>0?'<span style="font-size:11px;color:var(--t3)">Rev: $'+fmt(d.revenue)+'/yr</span>':'')+'</div><div class="deal-actions">'+(d.url?'<a href="'+esc(d.url)+'" target="_blank" class="deal-link">View Listing ↗</a>':'')+'<button class="interest-btn" id="int-'+d.listing_id+'" onclick="markInt('+d.listing_id+',\''+esc(d.name).replace(/'/g,"\\'")+'\')">I\'m Interested</button></div></div>'}).join('')}
async function markInt(lid,ln){const btn=document.getElementById('int-'+lid);if(btn.classList.contains('sent'))return;btn.textContent='Sending...';btn.disabled=true;try{const r=await fetch('/api/portal/interested',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({investor_id:inv.id,listing_id:lid})});const d=await r.json();if(d.success){btn.textContent='✓ Interest Sent';btn.classList.add('sent');toast('Interest registered! We\'ll contact you within 24 hours.');addMsg('ai','Great choice! I\'ve flagged your interest in '+ln+'. Our team will reach out within 24 hours.')}}catch(e){btn.textContent="I'm Interested";btn.disabled=false}}
function openEdit(){document.getElementById('editInd').value=inv.industries||'';document.getElementById('editLoc').value=inv.locations||'';document.getElementById('editMin').value=inv.min_price||'';document.getElementById('editMax').value=inv.max_price||'';document.getElementById('editModal').classList.add('open')}
async function saveCriteria(){const d={email:inv.email,industries:document.getElementById('editInd').value,locations:document.getElementById('editLoc').value,min_price:document.getElementById('editMin').value||null,max_price:document.getElementById('editMax').value||null};await fetch('/api/portal/update',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});document.getElementById('editModal').classList.remove('open');toast('Criteria updated!');portalLogin()}
function toggleChat(){document.getElementById('chatPanel').classList.toggle('open')}
function addMsg(role,text){const el=document.getElementById('chatMsgs');const d=document.createElement('div');d.className='cmsg '+role;if(role==='ai')d.innerHTML='<div class="ai-n">DealMatcher AI</div>'+esc(text);else d.textContent=text;el.appendChild(d);el.scrollTop=el.scrollHeight}
async function sendChat(){const i=document.getElementById('chatIn');const msg=i.value.trim();if(!msg)return;i.value='';addMsg('user',msg);const ms=matches.slice(0,5).map(m=>m.name+' ($'+fmt(m.asking_price)+')').join('; ');try{const r=await fetch('/api/portal/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,investor_name:inv.name,investor_criteria:inv.industries+' in '+inv.locations,matches_summary:ms})});const d=await r.json();addMsg('ai',d.reply)}catch(e){addMsg('ai','Connection issue. Try again.')}}
function logout(){inv=null;matches=[];document.getElementById('portal').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('chatToggle').style.display='none';document.getElementById('chatPanel').classList.remove('open');document.getElementById('chatMsgs').innerHTML=''}
function fmt(n){if(!n&&n!==0)return'0';return Number(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}
</script>
</body>
</html>

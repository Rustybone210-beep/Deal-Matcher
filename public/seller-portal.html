<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealMatcher — Seller Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060810;--s1:rgba(14,17,28,0.92);--s2:rgba(20,24,40,0.88);--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);--teal:#34d399;--teal2:#059669;--gold:#f59e0b;--red:#ef4444;--t1:#f0f2f8;--t2:#7c8599;--t3:#3d4560;--sans:'Instrument Sans',system-ui,sans-serif;--serif:'Fraunces',serif}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center}
.login-box h1{font-family:var(--serif);font-size:28px;margin-bottom:6px}
.login-box h1 span{color:var(--teal)}
.login-box p{color:var(--t2);font-size:14px;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-size:16px;margin-bottom:16px;outline:none;font-family:var(--sans)}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--bg);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}
.portal{display:none}
.header{background:rgba(8,10,18,0.98);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header h1{font-family:var(--serif);font-size:20px}.header h1 span{color:var(--teal)}
.logout-btn{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--t2)}
.welcome{padding:28px 24px;background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(5,150,105,0.04));border-bottom:1px solid var(--bd)}
.welcome h2{font-family:var(--serif);font-size:24px;margin-bottom:4px}
.welcome p{color:var(--t2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 24px}
.stat-box{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:18px;text-align:center}
.stat-num{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--teal)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);margin-top:4px}
.section-title{font-family:var(--serif);font-size:18px;font-weight:700;padding:24px 24px 12px}
.listings{padding:0 24px 100px}
.listing-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:12px;transition:all 0.15s}
.listing-card:hover{border-color:rgba(52,211,153,0.3)}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.lc-name{font-weight:700;font-size:16px}
.lc-price{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--teal)}
.lc-meta{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
.lc-badge{padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase}
.lc-badge.ind{background:rgba(59,130,246,0.1);color:#3b82f6}
.lc-badge.status-new{background:rgba(245,158,11,0.1);color:var(--gold)}
.lc-badge.status-active{background:rgba(52,211,153,0.1);color:var(--teal)}
.lc-badge.status-interested{background:rgba(239,68,68,0.1);color:var(--red)}
.lc-investors{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
.lc-investors h4{font-size:12px;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.inv-item{font-size:13px;color:var(--t2);padding:4px 0}
.inv-item strong{color:var(--t1)}
.add-btn{display:inline-block;padding:12px 24px;background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--bg);border-radius:999px;font-size:14px;font-weight:700;text-decoration:none;margin:0 24px 24px}
@media(max-width:640px){.lc-top{flex-direction:column}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen"><div class="login-box"><h1>Deal<span>Matcher</span></h1><p>Seller Portal — Enter your email to view your listings</p><input class="login-input" id="loginEmail" type="email" placeholder="your@email.com" autofocus><button class="login-btn" onclick="login()">View My Listings</button><div class="login-error" id="loginError"></div><p style="margin-top:20px;font-size:12px;color:var(--t3)">Want to list a deal? <a href="/sell.html" style="color:var(--teal)">Submit here</a></p></div></div>
<div class="portal" id="portal">
<div class="header"><h1>Deal<span>Matcher</span> <span style="font-size:12px;color:var(--t2)">Seller Portal</span></h1><button class="logout-btn" onclick="location.reload()">Log Out</button></div>
<div class="welcome"><h2 id="welcomeName"></h2><p>Track your listings, see investor interest, and manage your deals.</p></div>
<div class="stats-row" id="statsRow"></div>
<a href="/sell.html" class="add-btn">+ Submit New Listing</a>
<div class="section-title">Your Listings</div>
<div class="listings" id="listings"></div>
</div>
<script>
document.getElementById('loginEmail').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
async function login(){const email=document.getElementById('loginEmail').value.trim();if(!email)return;const err=document.getElementById('loginError');err.style.display='none';try{const r=await fetch('/api/seller/portal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const d=await r.json();if(!r.ok){err.textContent=d.error;err.style.display='block';return}render(d)}catch(e){err.textContent='Connection error';err.style.display='block'}}
function render(d){document.getElementById('loginScreen').style.display='none';document.getElementById('portal').style.display='block';document.getElementById('welcomeName').textContent='Welcome, '+(d.contact_name||'Seller');let totalInterest=0;d.listings.forEach(l=>totalInterest+=l.interested_count||0);document.getElementById('statsRow').innerHTML='<div class="stat-box"><div class="stat-num">'+d.listings.length+'</div><div class="stat-lbl">Listings</div></div><div class="stat-box"><div class="stat-num">'+d.total_matches+'</div><div class="stat-lbl">Investor Matches</div></div><div class="stat-box"><div class="stat-num">'+totalInterest+'</div><div class="stat-lbl">Interested</div></div>';
const el=document.getElementById('listings');if(!d.listings.length){el.innerHTML='<div style="text-align:center;padding:48px;color:var(--t3)">No listings yet. <a href="/sell.html" style="color:var(--teal)">Submit your first deal</a></div>';return}
el.innerHTML=d.listings.map(l=>'<div class="listing-card"><div class="lc-top"><div><div class="lc-name">'+esc(l.name)+'</div><div style="font-size:13px;color:var(--t2)">'+(l.city?l.city+', ':'')+l.state+'</div></div><div class="lc-price">$'+fmt(l.asking_price)+'</div></div><div class="lc-meta"><span class="lc-badge ind">'+esc(l.industry)+'</span><span class="lc-badge status-'+l.status+'">'+l.status.toUpperCase()+'</span><span style="font-size:11px;color:var(--t2)">'+l.match_count+' matches</span></div>'+(l.interested_investors&&l.interested_investors.length?'<div class="lc-investors"><h4>🔥 Interested Investors</h4>'+l.interested_investors.map(i=>'<div class="inv-item"><strong>'+esc(i.name)+'</strong> ('+esc(i.firm)+') — Score: '+i.score+'</div>').join('')+'</div>':'<div class="lc-investors"><h4>Investor Interest</h4><div class="inv-item">No interest expressed yet. Matches are being notified.</div></div>')+'</div>').join('')}
function fmt(n){return n?Number(n).toLocaleString('en-US',{maximumFractionDigits:0}):'0'}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
